name: dns-tunneling-env
version: 1.0

description: DNS tunneling detection RL environment using OpenEnv.

actions:
  type: discrete
  values: [0, 1, 2]

observations:
  type: float_array
  size: 4

tasks:
  - id: easy_detection
    description: Easy dataset
  - id: mixed_traffic
    description: Medium dataset
  - id: obfuscated_tunnel
    description: Hard dataset

reward_range: [0.0, 1.0]

endpoints:
  reset: /reset
  step: /step
  state: /state
